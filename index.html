<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DHAKA CITY OPS CENTER</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000814;--sb:rgba(0,8,20,0.94);--c1:rgba(0,15,35,0.9);--c2:rgba(0,20,45,0.95);
  --bd:rgba(0,229,255,0.15);--bd2:rgba(0,229,255,0.25);
  --ac:#00e5ff;--ac2:rgba(0,229,255,0.08);--acg:rgba(0,229,255,0.6);
  --tx:#c8f0ff;--tx2:#5fa8c8;--tx3:#2a5570;
  --gr:#00ff88;--yw:#ffcc00;--re:#ff4444;--or:#ff6b35;
  --glow:0 0 20px rgba(0,229,255,0.3);
}
html,body{
  height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Courier New',Courier,monospace}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:1}
.leaflet-container{background:#000814}
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{
  background:rgba(0,15,35,0.9)!important;color:var(--ac)!important;
  border:1px solid var(--bd2)!important;border-radius:6px!important;
  margin-bottom:3px!important;width:28px!important;height:28px!important;
  line-height:28px!important;font-size:.9rem!important;
  transition:all .2s!important;box-shadow:var(--glow)!important;
}
.leaflet-control-zoom a:hover{background:var(--ac2)!important;color:#fff!important}
.leaflet-control-attribution{
  background:rgba(0,8,20,0.8)!important;color:var(--tx3)!important;
  font-size:.55rem!important;border-radius:4px 0 0 0!important;
  border-top:1px solid var(--bd)!important;border-left:1px solid var(--bd)!important;
}
.leaflet-control-attribution a{color:var(--tx2)!important}
.leaflet-popup-close-button{color:var(--ac)!important}

/* ── CANVAS OVERLAYS ── */
#radar-canvas{
  position:fixed;inset:0;z-index:3;pointer-events:none;
}
#fx-canvas{
  position:fixed;inset:0;z-index:9;pointer-events:none;opacity:.7;
}

/* ── SCANLINES ── */
#scanlines{
  position:fixed;inset:0;z-index:10;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px
  );
}

/* ── VIGNETTE ── */
#vignette{
  position:fixed;inset:0;z-index:11;pointer-events:none;
  background:radial-gradient(ellipse at 60% 50%,transparent 40%,rgba(0,4,16,.8) 100%);
}

/* ── HUD CORNERS ── */
.hud-c{position:fixed;width:55px;height:55px;z-index:800;pointer-events:none}
.hud-tl{top:6px;left:6px;border-top:1.5px solid var(--acg);border-left:1.5px solid var(--acg)}
.hud-tr{top:6px;right:6px;border-top:1.5px solid var(--acg);border-right:1.5px solid var(--acg)}
.hud-bl{bottom:6px;left:6px;border-bottom:1.5px solid var(--acg);border-left:1.5px solid var(--acg)}
.hud-br{bottom:6px;right:6px;border-bottom:1.5px solid var(--acg);border-right:1.5px solid var(--acg)}
.hud-c::before,.hud-c::after{
  content:'';position:absolute;background:var(--ac);opacity:.7;
}
.hud-tl::before,.hud-tr::before{top:0;height:1px;width:10px}
.hud-bl::before,.hud-br::before{bottom:0;height:1px;width:10px}
.hud-tl::before{left:0} .hud-tr::before{right:0}
.hud-bl::before{left:0} .hud-br::before{right:0}

/* ── SIDEBAR ── */
#sb{
  position:fixed;left:0;top:0;bottom:0;width:290px;
  background:var(--sb);
  border-right:1px solid var(--bd2);
  z-index:500;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:4px 0 40px rgba(0,229,255,.08),inset -1px 0 0 rgba(0,229,255,.1);
  backdrop-filter:blur(20px);
}
#sb.closed{transform:translateX(-290px)}

/* header */
.sbh{
  padding:14px 14px 12px;flex-shrink:0;
  border-bottom:1px solid var(--bd);
  background:linear-gradient(180deg,rgba(0,229,255,.06) 0%,transparent 100%);
}
.sbh-brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sbh-hex{
  width:36px;height:36px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:var(--ac);
  filter:drop-shadow(0 0 8px var(--ac));
}
.sbh-title{
  font-size:.82rem;font-weight:800;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ac);
  text-shadow:0 0 12px rgba(0,229,255,.5);
}
.sbh-sub{font-size:.58rem;color:var(--tx3);letter-spacing:.06em;margin-top:2px}
.status-bar{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
  padding:5px 8px;background:rgba(0,255,136,.06);
  border:1px solid rgba(0,255,136,.2);border-radius:5px;
}
.status-pip{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:sblink 1.4s infinite}
@keyframes sblink{0%,100%{opacity:1;box-shadow:0 0 5px var(--gr)}50%{opacity:.3;box-shadow:none}}
.status-txt{font-size:.62rem;font-weight:700;color:var(--gr);letter-spacing:.1em;text-transform:uppercase}
.status-time{margin-left:auto;font-size:.6rem;color:var(--tx3);font-family:monospace}
.sbh-search{position:relative}
.sbh-si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:.8rem;pointer-events:none}
.sbh-input{
  width:100%;background:rgba(0,229,255,.04);
  border:1px solid var(--bd);color:var(--tx);
  padding:8px 11px 8px 32px;border-radius:6px;
  font-size:.78rem;outline:none;transition:border-color .2s;font-family:inherit;
}
.sbh-input:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(0,229,255,.08)}
.sbh-input::placeholder{color:var(--tx3)}

/* body */
.sbb{flex:1;overflow-y:auto;overflow-x:hidden}
.sbb::-webkit-scrollbar{width:2px}
.sbb::-webkit-scrollbar-thumb{background:rgba(0,229,255,.2);border-radius:1px}

/* voronoi ctrl */
.vctrl{
  margin:10px 12px 2px;
  background:linear-gradient(135deg,rgba(0,229,255,.06),rgba(0,100,255,.06));
  border:1px solid rgba(0,229,255,.18);border-radius:8px;padding:10px 11px;
}
.vctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.vctrl-lbl{
  font-size:.62rem;font-weight:800;color:var(--ac);flex:1;
  letter-spacing:.1em;text-transform:uppercase;
}
.vtog{
  position:relative;width:34px;height:18px;cursor:pointer;flex-shrink:0;
  background:rgba(0,229,255,.15);border:1px solid var(--bd2);border-radius:999px;
  transition:background .2s;outline:none;
}
.vtog.on{background:rgba(0,229,255,.35);border-color:var(--ac);box-shadow:0 0 8px rgba(0,229,255,.4)}
.vtog::after{
  content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;
  border-radius:50%;background:var(--ac);transition:transform .2s;
  box-shadow:0 0 6px var(--ac);
}
.vtog.on::after{transform:translateX(16px)}
.vctrl-sub{font-size:.6rem;color:var(--tx3)}
.vslider{
  flex:1;accent-color:var(--ac);cursor:pointer;height:3px;
  background:rgba(0,229,255,.15);border-radius:2px;outline:none;-webkit-appearance:none;
}
.vslider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--ac);cursor:pointer;box-shadow:0 0 8px rgba(0,229,255,.7);
}
.valpha{font-size:.62rem;color:var(--ac);min-width:26px;text-align:right;font-family:monospace}

/* section header */
.sch{
  display:flex;align-items:center;gap:7px;padding:9px 13px 4px;
  cursor:pointer;user-select:none;border-bottom:1px solid rgba(0,229,255,.06);
}
.sch-t{
  font-size:.6rem;font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--tx3);flex:1;
}
.sch-n{
  font-size:.62rem;font-weight:700;
  background:rgba(0,229,255,.08);color:var(--tx2);
  padding:2px 7px;border-radius:999px;font-family:monospace;
}
.sch-arr{color:var(--tx3);font-size:.6rem;transition:transform .25s}
.sch.open .sch-arr{transform:rotate(90deg)}
.scb{overflow:hidden;transition:max-height .3s ease}

/* sim bar */
.sbar{display:flex;gap:5px;padding:6px 12px 6px}
.sbarbtn{
  flex:1;padding:6px 8px;border-radius:6px;font-size:.68rem;font-weight:800;
  cursor:pointer;border:1px solid var(--bd);background:rgba(0,229,255,.05);
  color:var(--tx2);transition:all .2s;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:4px;
  letter-spacing:.05em;text-transform:uppercase;
}
.sbarbtn:hover{background:rgba(0,229,255,.12);border-color:var(--ac);color:var(--ac)}
.sbarbtn.live{
  background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.4);
  color:var(--gr);animation:liveBtn 1.5s infinite;
}
@keyframes liveBtn{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.3)}50%{box-shadow:0 0 0 4px rgba(0,255,136,.1)}}

/* user row */
.urow{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  cursor:pointer;transition:background .12s;position:relative;
}
.urow:hover{background:rgba(0,229,255,.04)}
.urow.hidden{opacity:.28}
.urow::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:0;background:var(--uc,var(--ac));border-radius:1px;
  transition:height .25s;
}
.urow:hover::before{height:70%}
.udot-w{position:relative;width:14px;height:14px;flex-shrink:0}
.udot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.upip{
  position:absolute;bottom:-2px;right:-2px;
  width:6px;height:6px;border-radius:50%;border:1.5px solid var(--sb);
}
.upip.online{background:var(--gr);box-shadow:0 0 4px var(--gr)}
.upip.away{background:var(--yw)}
.upip.offline{background:var(--tx3)}
.uinfo{flex:1;min-width:0}
.uname{font-size:.76rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.umeta{font-size:.58rem;color:var(--tx3);font-family:monospace;letter-spacing:.04em;margin-top:1px}
.uact{
  width:20px;height:20px;border-radius:5px;background:rgba(0,229,255,.06);
  border:1px solid var(--bd);color:var(--tx2);cursor:pointer;
  font-size:.65rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;margin-left:1px;
}
.uact:hover{background:var(--ac);color:#000;border-color:var(--ac);box-shadow:0 0 8px var(--ac)}

/* cat rows */
.cat-ctrl{display:flex;gap:5px;padding:4px 12px 5px}
.ccbtn{
  flex:1;padding:4px;border-radius:5px;font-size:.62rem;font-weight:800;
  cursor:pointer;border:1px solid var(--bd);background:rgba(0,229,255,.03);
  color:var(--tx3);transition:all .2s;font-family:inherit;
  text-transform:uppercase;letter-spacing:.06em;
}
.ccbtn:hover{background:rgba(0,229,255,.1);color:var(--ac);border-color:var(--ac)}
.crow{
  display:flex;align-items:center;gap:7px;padding:5px 12px;
  cursor:pointer;background:none;border:none;color:var(--tx);
  font-family:inherit;width:100%;text-align:left;
  transition:background .12s;border-left:2px solid transparent;
}
.crow:hover{background:rgba(0,229,255,.03)}
.crow.on{border-left-color:var(--cc);background:rgba(0,229,255,.02)}
.crow:not(.on){opacity:.35}
.cglyph{
  width:7px;height:7px;border-radius:50%;background:var(--cc);flex-shrink:0;
  box-shadow:0 0 6px var(--cc),0 0 12px var(--cc);
}
.cemoji{font-size:.78rem;flex-shrink:0}
.cname{font-size:.74rem;font-weight:500;flex:1;letter-spacing:.01em}
.ccnt{
  font-size:.62rem;font-weight:800;background:rgba(0,229,255,.07);
  color:var(--tx2);padding:1px 6px;border-radius:999px;
  min-width:24px;text-align:center;font-family:monospace;
}
.crow.on .ccnt{background:rgba(var(--ccr),.2);color:var(--cc)}

/* stats footer */
.sbf{
  border-top:1px solid var(--bd);padding:10px 12px;flex-shrink:0;
  background:rgba(0,5,15,.8);
}
.sfg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}
.sbox{
  background:rgba(0,229,255,.04);border:1px solid var(--bd);
  border-radius:6px;padding:6px;text-align:center;
}
.sv{
  font-size:1rem;font-weight:900;color:var(--ac);display:block;
  font-family:monospace;text-shadow:0 0 10px rgba(0,229,255,.6);
}
.sl{font-size:.52rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.snote{font-size:.55rem;color:var(--tx3);text-align:center;letter-spacing:.02em}

/* ── TOP BAR ── */
#tb{
  position:fixed;top:0;left:290px;right:0;height:46px;
  background:rgba(0,5,20,.92);border-bottom:1px solid var(--bd);
  backdrop-filter:blur(20px);z-index:400;
  display:flex;align-items:center;gap:7px;padding:0 10px;
  transition:left .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 0 rgba(0,229,255,.12);
}
#tb.full{left:0}
.tbb{
  width:30px;height:30px;border-radius:7px;
  background:rgba(0,229,255,.06);border:1px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.85rem;flex-shrink:0;color:var(--ac);
  transition:all .2s;text-shadow:0 0 8px var(--ac);
}
.tbb:hover{background:rgba(0,229,255,.15);box-shadow:var(--glow)}
.tbt{
  font-size:.78rem;font-weight:800;letter-spacing:.12em;
  text-transform:uppercase;white-space:nowrap;
  color:var(--ac);text-shadow:0 0 12px rgba(0,229,255,.5);
}
.tbsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.srow{display:flex;gap:3px}
.sstyle{
  padding:4px 9px;border-radius:6px;font-size:.65rem;font-weight:800;
  cursor:pointer;border:1px solid var(--bd);background:rgba(0,229,255,.04);
  color:var(--tx3);transition:all .2s;font-family:inherit;
  white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;
}
.sstyle.on{background:rgba(0,229,255,.15);border-color:var(--ac);color:var(--ac);box-shadow:0 0 8px rgba(0,229,255,.2)}
.opill{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);
  border-radius:999px;padding:3px 10px;font-size:.65rem;font-weight:800;
  color:var(--gr);white-space:nowrap;text-shadow:0 0 8px var(--gr);
  letter-spacing:.06em;
}
.opip{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:sblink 1.4s infinite}

/* ── TACTICAL USER MARKERS ── */
.tm{position:relative;cursor:pointer}
.tm-lbl{
  position:absolute;top:calc(100% + 2px);left:50%;transform:translateX(-50%);
  font-size:8px;font-weight:900;white-space:nowrap;
  font-family:'Courier New',monospace;letter-spacing:.06em;
  text-shadow:0 0 10px currentColor,0 1px 2px rgba(0,0,0,.9);
  pointer-events:none;
}

/* ── CUSTOM POPUP ── */
.custom-popup .leaflet-popup-content-wrapper{
  background:rgba(0,8,25,.95);
  border:1px solid var(--bd2);border-radius:10px;
  box-shadow:0 16px 48px rgba(0,0,0,.9),0 0 30px rgba(0,229,255,.1);
  padding:0;overflow:hidden;min-width:220px;
  backdrop-filter:blur(20px);
}
.custom-popup .leaflet-popup-tip-container{display:none}
.custom-popup .leaflet-popup-content{margin:0;padding:0}
.ph{
  padding:11px 13px 9px;
  border-bottom:1px solid rgba(0,229,255,.12);
  background:linear-gradient(180deg,rgba(0,229,255,.05) 0%,transparent 100%);
}
.pbadge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;
  font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;
}
.pname{font-size:.88rem;font-weight:800;color:var(--tx);margin-bottom:4px;letter-spacing:.02em}
.psub{font-size:.68rem;color:var(--tx2);line-height:1.6;font-family:monospace}
.pfoot{
  padding:6px 13px;font-size:.6rem;color:var(--tx3);
  background:rgba(0,229,255,.03);letter-spacing:.04em;
  border-top:1px solid rgba(0,229,255,.08);
}

/* Voronoi flow animation on SVG paths */
.v-cell{animation:vFlow 7s linear infinite}
@keyframes vFlow{from{stroke-dashoffset:0}to{stroke-dashoffset:-80}}

/* Voronoi tooltip */
.leaflet-tooltip.vtt{
  background:rgba(0,8,25,.95);border:1px solid var(--bd2);border-radius:6px;
  color:var(--tx);font-size:.7rem;font-weight:700;padding:5px 10px;
  box-shadow:0 4px 20px rgba(0,0,0,.7);font-family:monospace;
}

/* ── LEGEND PANEL ── */
#lgp{
  position:fixed;right:10px;top:56px;
  background:rgba(0,8,25,.95);border:1px solid var(--bd2);
  border-radius:10px;padding:11px 13px;z-index:400;
  backdrop-filter:blur(20px);font-size:.68rem;
  max-height:calc(100dvh - 74px);overflow-y:auto;
  display:none;min-width:155px;
  box-shadow:0 10px 40px rgba(0,0,0,.8),var(--glow);
}
#lgp::-webkit-scrollbar{width:2px}
#lgp::-webkit-scrollbar-thumb{background:rgba(0,229,255,.2)}
#lgp.show{display:block;animation:lgIn .2s ease}
@keyframes lgIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.lgt{
  font-size:.56rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--tx3);margin:7px 0 3px;
}
.lgt:first-child{margin-top:0}
.lgr{display:flex;align-items:center;gap:7px;padding:2px 0}
.lgd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lgl{color:var(--tx2);white-space:nowrap;font-weight:600}

/* ── TOAST ── */
#toast{
  position:fixed;top:56px;left:50%;transform:translateX(-50%);
  background:rgba(0,8,25,.96);border:1px solid var(--bd2);
  border-radius:7px;padding:7px 15px;font-size:.74rem;
  color:var(--ac);z-index:9000;opacity:0;pointer-events:none;
  transition:opacity .25s;white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,.8),var(--glow);
  font-family:monospace;letter-spacing:.04em;
}
#toast.show{opacity:1}

/* ── BOOT SCREEN ── */
#boot{
  position:fixed;inset:0;z-index:2000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;transition:opacity .6s;
}
#boot.out{opacity:0;pointer-events:none}
.boot-wrap{width:min(460px,90vw)}
.boot-top{
  border:1px solid rgba(0,229,255,.25);border-radius:10px;
  padding:24px;margin-bottom:14px;
  background:rgba(0,8,20,.8);
  box-shadow:0 0 40px rgba(0,229,255,.08);
}
.boot-hex{font-size:2.6rem;color:var(--ac);filter:drop-shadow(0 0 16px var(--ac));margin-bottom:10px}
.boot-title{
  font-size:1rem;font-weight:900;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ac);
  text-shadow:0 0 20px rgba(0,229,255,.6);margin-bottom:2px;
}
.boot-ver{font-size:.62rem;color:var(--tx3);font-family:monospace;letter-spacing:.1em;margin-bottom:16px}
.boot-lines{min-height:130px;font-family:monospace;font-size:.68rem;color:var(--tx2);line-height:1.8}
.boot-line{display:flex;align-items:center;gap:6px}
.boot-ok{color:var(--gr);font-weight:800;text-shadow:0 0 10px var(--gr)}
.boot-warn{color:var(--yw)}
.boot-cursor{
  display:inline-block;width:7px;height:12px;
  background:var(--ac);margin-left:2px;
  animation:blink .7s infinite;vertical-align:middle;
}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.boot-bar-row{display:flex;align-items:center;gap:10px}
.boot-bar{flex:1;height:3px;background:rgba(0,229,255,.15);border-radius:999px;overflow:hidden}
.boot-fill{height:100%;width:0;background:linear-gradient(90deg,#00e5ff,#00ff88);border-radius:999px;transition:width .4s ease}

<script>
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════

  {id:'market',     label:'Markets',       icon:'🛒', color:'#F9CA24', rgb:'249,202,36',  tag:{amenity:'marketplace'},      r:7},

// ═══════════════════════════════════════════════════════
//  12 LIVE USERS — each a distinct vivid color
// ═══════════════════════════════════════════════════════
const USERS = [
  {id:'USR-001', name:'Rafiqul Islam',  role:'FIELD AGENT',  color:'#FF6B6B', lat:23.7806, lng:90.4193, status:'online' },
  {id:'USR-002', name:'Nasrin Begum',   role:'INSPECTOR',    color:'#00E5FF', lat:23.7466, lng:90.3765, status:'online' },
  {id:'USR-003', name:'Kamal Hossain', role:'DELIVERY',     color:'#FFEA00', lat:23.7937, lng:90.4142, status:'away'   },
  {id:'USR-004', name:'Fatema Khatun', role:'SUPERVISOR',   color:'#76FF03', lat:23.7348, lng:90.4224, status:'online' },
  {id:'USR-005', name:'Rahim Uddin',   role:'FIELD AGENT',  color:'#FF6D00', lat:23.8136, lng:90.4253, status:'online' },
  {id:'USR-006', name:'Shirin Akter',  role:'MANAGER',      color:'#EA80FC', lat:23.7532, lng:90.3748, status:'away'   },
  {id:'USR-007', name:'Delwar Hossain',role:'DELIVERY',     color:'#FF4081', lat:23.7284, lng:90.3940, status:'online' },
  {id:'USR-008', name:'Amena Khanam',  role:'FIELD AGENT',  color:'#00E676', lat:23.7574, lng:90.3892, status:'offline'},
  {id:'USR-009', name:'Nurul Islam',   role:'INSPECTOR',    color:'#448AFF', lat:23.8734, lng:90.3984, status:'online' },
  {id:'USR-010', name:'Rokeya Sultana',role:'SUPERVISOR',   color:'#FF6E40', lat:23.7183, lng:90.3875, status:'online' },
  {id:'USR-011', name:'Anisur Rahman', role:'FIELD AGENT',  color:'#40C4FF', lat:23.7627, lng:90.3787, status:'away'   },
  {id:'USR-012', name:'Sumaiya Parvin',role:'DELIVERY',     color:'#CCFF90', lat:23.7803, lng:90.4202, status:'online' },
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const catActive = {}; CATS.forEach(c => catActive[c.id] = true);
const catLayers = {}; CATS.forEach(c => catLayers[c.id] = L.layerGroup());
const catData   = {}; CATS.forEach(c => catData[c.id]   = []);
const userVis   = {}; USERS.forEach(u => userVis[u.id]  = true);
const userMks   = {};
const userTrails= {};
const userHist  = {}; USERS.forEach(u => userHist[u.id] = [[u.lat,u.lng]]);
const origPos   = {}; USERS.forEach(u => origPos[u.id]  = {lat:u.lat,lng:u.lng});
let simTimer = null, voronoiOn = true, voronoiAlpha = 0.12;
let radarAngle = 0, breathPhase = 0, sbOpen = true;
let voronoiDT  = null;

// ═══════════════════════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════════════════════
const DHAKA = [23.7806, 90.4193];
const map = L.map('map',{center:DHAKA,zoom:13,zoomControl:false,attributionControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.control.attribution({position:'bottomleft',prefix:false})
  .addTo(map).setPrefix('<a href="https://leafletjs.com" style="color:#2a5570">Leaflet</a>');

const TILES = {
  dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  osm:   'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
};
let tileLayer = L.tileLayer(TILES.dark,{maxZoom:19}).addTo(map);
function setTile(k,btn){
  map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(TILES[k],{maxZoom:19}).addTo(map);
  tileLayer.bringToBack();
  document.querySelectorAll('.sstyle').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// Layer order: voronoi → trails → utility markers → user markers
const voronoiLayer = L.layerGroup().addTo(map);
const trailLayer   = L.layerGroup().addTo(map);
const userMarkLay  = L.layerGroup().addTo(map);
CATS.forEach(c => catLayers[c.id].addTo(map));

// City boundary
L.circle(DHAKA,{radius:15000,fillColor:'rgba(0,229,255,0.02)',fillOpacity:1,
  color:'rgba(0,229,255,0.12)',weight:1,dashArray:'5 6'}).addTo(map);
L.circle(DHAKA,{radius:8000,fillColor:'rgba(0,229,255,0.01)',fillOpacity:1,
  color:'rgba(0,229,255,0.07)',weight:0.5,dashArray:'3 8'}).addTo(map);

// Center marker
L.marker(DHAKA,{icon:L.divIcon({
  className:'',
  html:`<div style="width:10px;height:10px;border-radius:50%;background:#00e5ff;
    border:2px solid rgba(255,255,255,.8);
    box-shadow:0 0 0 5px rgba(0,229,255,.15),0 0 24px #00e5ff;"></div>`,
  iconSize:[10,10],iconAnchor:[5,5],
})}).addTo(map).bindPopup(
  '<div class="ph"><div class="pbadge" style="background:rgba(0,229,255,.12);color:#00e5ff">⬡ ORIGIN</div><div class="pname">Dhaka City Centre</div><div class="psub">23.7806°N 90.4193°E<br/>Motijheel, Dhaka</div></div>',
  {className:'custom-popup'});

// ═══════════════════════════════════════════════════════
//  RADAR CANVAS — rotating sweep
// ═══════════════════════════════════════════════════════
const RC = document.getElementById('radar-canvas');
const rctx = RC.getContext('2d');

function resizeRadar(){RC.width=window.innerWidth;RC.height=window.innerHeight}
resizeRadar();
window.addEventListener('resize',resizeRadar);

function drawRadar(){
  const W=RC.width, H=RC.height;
  rctx.clearRect(0,0,W,H);

  const cp = map.latLngToContainerPoint(DHAKA);
  const cx=cp.x, cy=cp.y;
  const maxR = 320;

  // Concentric grid rings
  [70,140,210,280,340].forEach((r,i)=>{
    rctx.beginPath();
    rctx.arc(cx,cy,r,0,Math.PI*2);
    rctx.strokeStyle=`rgba(0,229,255,${0.1-i*0.017})`;
    rctx.lineWidth=0.6;
    rctx.stroke();
  });

  // Cross hairs
  rctx.save();
  rctx.strokeStyle='rgba(0,229,255,0.05)';
  rctx.lineWidth=0.5;
  rctx.setLineDash([4,8]);
  rctx.beginPath();rctx.moveTo(cx-maxR,cy);rctx.lineTo(cx+maxR,cy);rctx.stroke();
  rctx.beginPath();rctx.moveTo(cx,cy-maxR);rctx.lineTo(cx,cy+maxR);rctx.stroke();
  rctx.setLineDash([]);
  rctx.restore();

  // Sweep afterglow (40 fade lines)
  const trail = Math.PI * 0.55;
  for(let i=0;i<40;i++){
    const a = radarAngle - (i/40)*trail;
    const op = (1-i/40)*0.18;
    rctx.beginPath();
    rctx.moveTo(cx,cy);
    rctx.lineTo(cx+Math.cos(a)*maxR, cy+Math.sin(a)*maxR);
    rctx.strokeStyle=`rgba(0,229,255,${op})`;
    rctx.lineWidth=2.5;
    rctx.stroke();
  }

  // Main sweep line
  rctx.beginPath();
  rctx.moveTo(cx,cy);
  rctx.lineTo(cx+Math.cos(radarAngle)*maxR, cy+Math.sin(radarAngle)*maxR);
  rctx.strokeStyle='rgba(0,229,255,0.75)';
  rctx.lineWidth=1.5;
  rctx.stroke();

  // Center glow dot
  rctx.beginPath();
  rctx.arc(cx,cy,4,0,Math.PI*2);
  rctx.fillStyle='rgba(0,229,255,0.9)';
  rctx.fill();
  rctx.beginPath();
  rctx.arc(cx,cy,10,0,Math.PI*2);
  rctx.fillStyle='rgba(0,229,255,0.12)';
  rctx.fill();

  // User blips on radar
  USERS.forEach(u=>{
    if(!userVis[u.id]||u.status==='offline') return;
    const pt = map.latLngToContainerPoint([u.lat,u.lng]);
    // Blip outer glow
    rctx.beginPath();
    rctx.arc(pt.x,pt.y,7,0,Math.PI*2);
    rctx.fillStyle=u.color+'28';
    rctx.fill();
    // Blip core
    rctx.beginPath();
    rctx.arc(pt.x,pt.y,3,0,Math.PI*2);
    rctx.fillStyle=u.color;
    rctx.fill();
    // Blip id
    rctx.fillStyle=u.color;
    rctx.font='600 8px monospace';
    rctx.fillText(u.id.slice(-3),pt.x+6,pt.y-5);
  });

  radarAngle += 0.018;
  requestAnimationFrame(drawRadar);
}
drawRadar();

// ═══════════════════════════════════════════════════════
//  VORONOI — d3-delaunay, breathing animation
// ═══════════════════════════════════════════════════════
function recomputeVoronoi(){
  voronoiLayer.clearLayers();
  if(!voronoiOn||!window.d3Delaunay) return;

  const vis = USERS.filter(u=>userVis[u.id]&&u.status!=='offline');
  if(vis.length<2) return;

  const {x:W,y:H} = map.getSize();
  const PAD = 140;
  const pts = vis.map(u=>{
    const p=map.latLngToContainerPoint([u.lat,u.lng]);
    return [p.x,p.y];
  });

  const delaunay = d3Delaunay.Delaunay.from(pts);
  const voronoi  = delaunay.voronoi([-PAD,-PAD,W+PAD,H+PAD]);

  vis.forEach((u,i)=>{
    const cell = voronoi.cellPolygon(i);
    if(!cell||cell.length<3) return;
    const lls = cell.map(([x,y])=>map.containerPointToLatLng(L.point(x,y)));

    const poly = L.polygon(lls,{
      fillColor:   u.color,
      fillOpacity: voronoiAlpha,
      color:       u.color,
      weight:      1.5,
      opacity:     0.5,
      dashArray:   '10 5',
      className:   'v-cell',
    });

    poly.on('mouseover',()=>{
      poly.setStyle({fillOpacity:Math.min(voronoiAlpha*3,0.6),weight:2.5,opacity:0.9});
      poly.bringToFront();
    });
    poly.on('mouseout',()=>{
      poly.setStyle({fillOpacity:voronoiAlpha,weight:1.5,opacity:0.5});
    });
    poly.on('click',()=>{
      map.flyTo([u.lat,u.lng],Math.max(map.getZoom(),15),{duration:1.1});
      setTimeout(()=>userMks[u.id]?.openPopup(),1200);
    });
    poly.bindTooltip(
      `<b style="color:${u.color}">${u.id}</b>  ${u.name}<br/><span style="color:#5fa8c8">${u.role}</span>`,
      {sticky:true,className:'vtt',opacity:0.96}
    );
    voronoiLayer.addLayer(poly);
  });
  voronoiLayer.bringToBack();
}

// Breathing: oscillate fill opacity
setInterval(()=>{
  breathPhase += 0.04;
  const mul = 0.72 + 0.28*(0.5+0.5*Math.sin(breathPhase));
  voronoiLayer.eachLayer(p=>p.setStyle({fillOpacity:voronoiAlpha*mul}));
},55);

function scheduleVoronoi(){clearTimeout(voronoiDT);voronoiDT=setTimeout(recomputeVoronoi,180);}
map.on('moveend zoomend',scheduleVoronoi);

// ═══════════════════════════════════════════════════════
//  USER MARKERS — SVG tactical reticle
// ═══════════════════════════════════════════════════════
function makeUserIcon(u){
  const c=u.color, S=42, cx=21, cy=21, OR=16, CR=7;
  const alive = u.status!=='offline';
  const pulseA = u.status==='online' ? '2.6s' : '5s';

  const svg=`<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer ring -->
    <circle cx="${cx}" cy="${cy}" r="${OR}" stroke="${c}" stroke-width="${alive?'1':'0.5'}" opacity="${alive?'0.55':'0.2'}"/>
    ${alive?`
    <!-- Pulse ring 1 -->
    <circle cx="${cx}" cy="${cy}" r="${OR}" stroke="${c}" stroke-width="1" fill="none">
      <animate attributeName="r" values="${OR};${OR+10};${OR}" dur="${pulseA}" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="${pulseA}" repeatCount="indefinite"/>
    </circle>
    <!-- Pulse ring 2 (offset) -->
    <circle cx="${cx}" cy="${cy}" r="${OR}" stroke="${c}" stroke-width="0.8" fill="none">
      <animate attributeName="r" values="${OR};${OR+9};${OR}" dur="${pulseA}" begin="${parseFloat(pulseA)/2}s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="${pulseA}" begin="${parseFloat(pulseA)/2}s" repeatCount="indefinite"/>
    </circle>`:''}
    <!-- Corner brackets -->
    <path d="M${cx-OR-3} ${cy-OR+5} L${cx-OR-3} ${cy-OR-3} L${cx-OR+5} ${cy-OR-3}"
      stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="${alive?'1':'0.35'}"/>
    <path d="M${cx+OR-5} ${cy-OR-3} L${cx+OR+3} ${cy-OR-3} L${cx+OR+3} ${cy-OR+5}"
      stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="${alive?'1':'0.35'}"/>
    <path d="M${cx-OR-3} ${cy+OR-5} L${cx-OR-3} ${cy+OR+3} L${cx-OR+5} ${cy+OR+3}"
      stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="${alive?'1':'0.35'}"/>
    <path d="M${cx+OR-5} ${cy+OR+3} L${cx+OR+3} ${cy+OR+3} L${cx+OR+3} ${cy+OR-5}"
      stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="${alive?'1':'0.35'}"/>
    <!-- Inner tick marks -->
    <line x1="${cx}" y1="${cy-OR+3}" x2="${cx}" y2="${cy-OR+7}" stroke="${c}" stroke-width="1" opacity="0.5"/>
    <line x1="${cx}" y1="${cy+OR-7}" x2="${cx}" y2="${cy+OR-3}" stroke="${c}" stroke-width="1" opacity="0.5"/>
    <line x1="${cx-OR+3}" y1="${cy}" x2="${cx-OR+7}" y2="${cy}" stroke="${c}" stroke-width="1" opacity="0.5"/>
    <line x1="${cx+OR-7}" y1="${cy}" x2="${cx+OR-3}" y2="${cy}" stroke="${c}" stroke-width="1" opacity="0.5"/>
    <!-- Center glow -->
    <circle cx="${cx}" cy="${cy}" r="${CR+3}" fill="${c}" opacity="0.15"/>
    <!-- Center solid -->
    <circle cx="${cx}" cy="${cy}" r="${CR}" fill="${c}" opacity="${alive?'0.95':'0.3'}"/>
  </svg>
  <div class="tm-lbl" style="color:${c};text-shadow:0 0 8px ${c},0 1px 3px rgba(0,0,0,.9)">${u.id.slice(-3)}</div>`;

  return L.divIcon({
    className:'tm',
    html:svg,
    iconSize:[S,S+14],
    iconAnchor:[cx,cy],
  });
}

function makeUserPopup(u){
  const se={online:'🟢 ONLINE',away:'🟡 AWAY',offline:'⚫ OFFLINE'};
  return `<div class="ph">
    <div class="pbadge" style="background:${u.color}22;color:${u.color}">▣ ${u.id}</div>
    <div class="pname">${u.name}</div>
    <div class="psub">
      ${se[u.status]} · ${u.role}<br/>
      LAT ${u.lat.toFixed(5)} · LNG ${u.lng.toFixed(5)}
    </div>
  </div>
  <div class="pfoot">▶ Click Voronoi zone · 🎯 Fly-to in sidebar</div>`;
}

function placeAllUserMarkers(){
  userMarkLay.clearLayers();
  trailLayer.clearLayers();
  USERS.forEach(u=>{
    if(!userVis[u.id]) return;
    const mk=L.marker([u.lat,u.lng],{icon:makeUserIcon(u),zIndexOffset:1500});
    mk.bindPopup(makeUserPopup(u),{className:'custom-popup',maxWidth:270});
    userMks[u.id]=mk;
    userMarkLay.addLayer(mk);
    drawTrail(u);
  });
}

function drawTrail(u){
  if(userTrails[u.id]) trailLayer.removeLayer(userTrails[u.id]);
  const hist=userHist[u.id];
  if(hist.length<2||u.status==='offline') return;
  const trail=L.polyline(hist.slice(-12),{
    color:u.color,weight:2,opacity:0.4,dashArray:'3 7'
  });
  trailLayer.addLayer(trail);
  userTrails[u.id]=trail;
}

function refreshUser(u){
  const mk=userMks[u.id]; if(!mk) return;
  mk.setLatLng([u.lat,u.lng]);
  mk.setIcon(makeUserIcon(u));
  mk.setPopupContent(makeUserPopup(u));
  drawTrail(u);
}

// ═══════════════════════════════════════════════════════
//  SIMULATION
// ═══════════════════════════════════════════════════════
function startSim(){
  if(simTimer) return;
  simTimer=setInterval(()=>{
    USERS.forEach(u=>{
      if(u.status==='offline') return;
      const spd=u.status==='online'?0.003:0.0012;
      u.lat=Math.max(23.66,Math.min(23.93,u.lat+(Math.random()-.5)*spd));
      u.lng=Math.max(90.29,Math.min(90.54,u.lng+(Math.random()-.5)*spd));
      userHist[u.id].push([u.lat,u.lng]);
      if(userHist[u.id].length>25) userHist[u.id].shift();
      refreshUser(u);
    });
    scheduleVoronoi();
    updateUserRows();
    beep(880+Math.random()*220,0.06,0.04);
  },1800);
  document.getElementById('simb').textContent='⏸ PAUSE';
  document.getElementById('simb').classList.add('live');
  showToast('▶ SIMULATION ACTIVE — tracking 12 field units');
}

// ═══════════════════════════════════════════════════════
let audioCtx=null;
function getAudio(){return audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)())}
function beep(freq=440,dur=0.08,vol=0.05){
  try{
    const ac=getAudio();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.type='sine';osc.frequency.value=freq;
    gain.gain.value=vol;
    osc.connect(gain);gain.connect(ac.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    osc.stop(ac.currentTime+dur);
  }catch(e){}
}

function catFromTags(tags){
  if(tags.amenity) for(const c of CATS){
    if(c.tag.amenity===tags.amenity){
      if(c.id==='mosque'&&tags.religion&&tags.religion!=='muslim') return null;
      return c;
    }
  }
  if(tags.leisure==='park')    return CATS.find(x=>x.id==='park');
  if(tags.highway==='bus_stop') return CATS.find(x=>x.id==='busstop');
  return null;
}

function makeUtilMarker(c,lat,lng,name,tags){
  const addr=tags['addr:street']?tags['addr:street']+', Dhaka':'Dhaka, Bangladesh';
  const op=tags.operator||tags.brand||'';
  const m=L.circleMarker([lat,lng],{radius:c.r,fillColor:c.color,fillOpacity:.82,
    color:'rgba(255,255,255,.4)',weight:1.5});
  m.bindPopup(`
    <div class="ph">
      <div class="pbadge" style="background:rgba(${c.rgb},.15);color:${c.color}">${c.icon} ${c.label.replace(/s$/,'')}</div>
      <div class="pname">${name||'Unnamed'}</div>
      <div class="psub">${op?`${op}<br/>`:''}📍 ${addr}</div>
    </div>
    <div class="pfoot">OpenStreetMap data</div>
  `,{className:'custom-popup',maxWidth:270});
  m.on('mouseover',()=>m.setStyle({fillOpacity:1,radius:c.r+2,
    color:c.color,weight:2}));
  m.on('mouseout', ()=>m.setStyle({fillOpacity:.82,radius:c.r,
    color:'rgba(255,255,255,.4)',weight:1.5}));
  return m;
}

function processElements(els){
  els.forEach(el=>{
    const tags=el.tags||{};
    const c=catFromTags(tags); if(!c) return;
    const lat=el.lat??el.center?.lat, lng=el.lon??el.center?.lon;
    if(!lat||!lng) return;
    const name=tags.name||tags['name:en']||tags['name:bn']||c.label.replace(/s$/,'');
    catData[c.id].push({name,lat,lng});
    catLayers[c.id].addLayer(makeUtilMarker(c,lat,lng,name,tags));
  });
  updateCounts();updateStats();
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
async function runBoot(){
  const cont=document.getElementById('boot-lines');
  // cursor placeholder
  const cur=document.createElement('span');cur.className='boot-cursor';
  cont.appendChild(cur);

  for(const line of BOOT_LINES){
    await sleep(line.delay - (BOOT_LINES.indexOf(line)>0?BOOT_LINES[BOOT_LINES.indexOf(line)-1].delay:0));
    const el=document.createElement('div');
    el.className='boot-line '+(line.cls||'');
    cont.insertBefore(el,cur);
    for(let i=0;i<line.t.length;i++){
      await sleep(14);
      el.textContent+=line.t[i];
    }
    bootProg(Math.round(8+(BOOT_LINES.indexOf(line)/BOOT_LINES.length)*52),'');
  }
  cur.remove();
  await sleep(400);
  beep(880,0.2,0.12);await sleep(100);beep(1100,0.2,0.12);
  await sleep(600);
  document.getElementById('boot').classList.add('out');
  setTimeout(()=>document.getElementById('boot').remove(),700);
}
