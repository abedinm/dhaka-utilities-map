<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Dhaka City Utilities Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;
  --sidebar:#0a0a18;
  --card:#10101f;
  --card2:#161628;
  --border:#1c1c35;
  --border2:#252545;
  --text:#dde1f5;
  --text2:#8890b8;
  --text3:#484e72;
  --accent:#38bdf8;
  --glow:rgba(56,189,248,0.15);
  --radius:10px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:1}
.leaflet-container{background:#06060f}
.leaflet-control-zoom a{background:#10101f!important;color:#dde1f5!important;border-color:#1c1c35!important}
.leaflet-control-zoom a:hover{background:#161628!important}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:290px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  z-index:500;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed{transform:translateX(-290px)}

/* ── SIDEBAR HEADER ── */
.sb-header{
  padding:18px 16px 14px;
  background:linear-gradient(180deg,#0d0d1e 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sb-logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
}
.sb-logo-text{font-size:1rem;font-weight:700;line-height:1.1}
.sb-logo-sub{font-size:.65rem;color:var(--text2);font-weight:500}

/* Search */
.sb-search{position:relative}
.sb-search input{
  width:100%;background:var(--card);border:1px solid var(--border2);
  color:var(--text);padding:9px 12px 9px 34px;border-radius:8px;
  font-size:.82rem;outline:none;transition:border-color .2s;font-family:inherit;
}
.sb-search input:focus{border-color:var(--accent)}
.sb-search input::placeholder{color:var(--text3)}
.sb-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem;pointer-events:none}

/* ── CATEGORIES SCROLL ── */
.sb-body{flex:1;overflow-y:auto;padding:10px 0}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sb-section-title{
  font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);padding:8px 16px 4px;
}

.cat-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:8px 16px;cursor:pointer;
  background:none;border:none;color:var(--text);
  font-family:inherit;text-align:left;
  transition:background .15s;border-left:3px solid transparent;
}
.cat-btn:hover{background:rgba(255,255,255,.04)}
.cat-btn.active{background:rgba(255,255,255,.06);border-left-color:var(--cat-color)}
.cat-btn.active .cat-label{color:var(--text)}
.cat-btn:not(.active) .cat-label{color:var(--text2)}
.cat-btn:not(.active) .cat-dot{opacity:.35}

.cat-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--cat-color);flex-shrink:0;
  box-shadow:0 0 6px var(--cat-color);
  transition:opacity .2s;
}
.cat-label{font-size:.82rem;font-weight:500;flex:1;transition:color .2s}
.cat-icon{font-size:.9rem;flex-shrink:0;opacity:.7}
.cat-count{
  font-size:.7rem;font-weight:700;
  background:rgba(255,255,255,.08);
  color:var(--text2);padding:1px 7px;border-radius:999px;
  min-width:26px;text-align:center;
}
.cat-btn.active .cat-count{background:rgba(var(--cat-rgb),.2);color:var(--cat-color)}

.sb-ctrl-row{display:flex;gap:6px;padding:8px 16px 4px}
.sb-ctrl-btn{
  flex:1;padding:6px;border-radius:7px;font-size:.7rem;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);background:var(--card);
  color:var(--text2);transition:all .2s;font-family:inherit;
}
.sb-ctrl-btn:hover{background:var(--card2);color:var(--text)}

/* ── STATS FOOTER ── */
.sb-stats{
  border-top:1px solid var(--border);padding:14px 16px;flex-shrink:0;
  background:var(--card);
}
.stats-row{display:flex;gap:8px;margin-bottom:10px}
.stat-box{
  flex:1;background:var(--card2);border:1px solid var(--border2);
  border-radius:8px;padding:8px;text-align:center;
}
.stat-val{font-size:1.3rem;font-weight:800;color:var(--text);display:block}
.stat-lbl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.data-src{font-size:.62rem;color:var(--text3);text-align:center}
.data-src a{color:var(--text2);text-decoration:none}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:290px;right:0;height:52px;
  background:rgba(6,6,15,.85);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  z-index:400;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  transition:left .35s cubic-bezier(.4,0,.2,1);
}
#topbar.full{left:0}

.toggle-btn{
  width:36px;height:36px;border-radius:9px;
  background:var(--card);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;flex-shrink:0;
  transition:background .2s;color:var(--text);
}
.toggle-btn:hover{background:var(--card2)}

.topbar-title{font-weight:700;font-size:.95rem;white-space:nowrap}
.topbar-title span{color:var(--accent)}

.style-btns{display:flex;gap:4px;margin-left:auto}
.style-btn{
  padding:5px 10px;border-radius:7px;font-size:.72rem;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);background:var(--card);
  color:var(--text2);transition:all .2s;font-family:inherit;white-space:nowrap;
}
.style-btn.active{background:rgba(56,189,248,.15);border-color:var(--accent);color:var(--accent)}

.status-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:#22c55e;box-shadow:0 0 6px #22c55e;
  margin-left:4px;
}
.status-dot.offline{background:#ef4444;box-shadow:0 0 6px #ef4444}
.status-lbl{font-size:.7rem;color:var(--text2);margin-right:4px}

/* ── LOADING OVERLAY ── */
#loading{
  position:fixed;inset:0;z-index:2000;
  background:rgba(6,6,15,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  transition:opacity .4s;
}
#loading.hidden{opacity:0;pointer-events:none}
.load-logo{font-size:3rem;animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.load-title{font-size:1.2rem;font-weight:700}
.load-sub{font-size:.82rem;color:var(--text2)}
.load-bar{width:220px;height:4px;background:var(--border2);border-radius:999px;overflow:hidden}
.load-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  border-radius:999px;
  transition:width .4s ease;
}
.load-status{font-size:.75rem;color:var(--text3)}

/* ── POPUP ── */
.custom-popup .leaflet-popup-content-wrapper{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  padding:0;overflow:hidden;
  min-width:200px;
}
.custom-popup .leaflet-popup-tip-container{display:none}
.custom-popup .leaflet-popup-content{margin:0;padding:0}
.popup-inner{padding:14px 16px}
.popup-type-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:999px;
  font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  margin-bottom:8px;
}
.popup-name{font-size:.95rem;font-weight:700;margin-bottom:4px;color:var(--text)}
.popup-detail{font-size:.75rem;color:var(--text2);line-height:1.5}
.popup-footer{
  padding:8px 16px;background:var(--card2);
  font-size:.68rem;color:var(--text3);
  border-top:1px solid var(--border);
}

/* ── INFO PANEL ── */
#info-panel{
  position:fixed;right:14px;bottom:14px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:12px;padding:14px 16px;
  z-index:400;
  max-width:230px;
  display:none;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── LEGEND MINI ── */
#mini-legend{
  position:fixed;right:14px;top:66px;
  background:rgba(10,10,24,.88);
  border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;
  z-index:400;backdrop-filter:blur(8px);
  font-size:.7rem;max-height:calc(100vh - 90px);
  overflow-y:auto;display:none;
}
#mini-legend::-webkit-scrollbar{width:2px}
#mini-legend.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.legend-row{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-label{color:var(--text2);font-weight:500;white-space:nowrap}

/* ── TOAST ── */
#toast{
  position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border2);
  border-radius:8px;padding:9px 16px;
  font-size:.8rem;color:var(--text);
  z-index:3000;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
#toast.show{opacity:1}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  #sidebar{width:260px}
  #sidebar.collapsed{transform:translateX(-260px)}
  #topbar{left:0!important;right:0}
  #topbar.sb-open{left:0}
  .topbar-title{display:none}
  .style-btns{display:none}
  #mini-legend{right:8px;top:60px}
  #info-panel{right:8px;bottom:8px;left:8px;max-width:none}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-logo">🗺️</div>
  <div class="load-title">Dhaka Utilities Map</div>
  <div class="load-sub">Fetching live city data…</div>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div class="load-status" id="load-status">Connecting to OpenStreetMap…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="sb-logo-icon">🏙️</div>
      <div>
        <div class="sb-logo-text">Dhaka Utilities</div>
        <div class="sb-logo-sub">Interactive City Map</div>
      </div>
    </div>
    <div class="sb-search">
      <span class="sb-search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search hospitals, parks…"/>
    </div>
  </div>

  <div class="sb-body">
    <div class="sb-section-title">Utility Categories</div>
    <div class="sb-ctrl-row">
      <button class="sb-ctrl-btn" onclick="toggleAll(true)">Show All</button>
      <button class="sb-ctrl-btn" onclick="toggleAll(false)">Hide All</button>
    </div>
    <div id="cat-list"></div>

    <div class="sb-section-title" style="margin-top:6px">Data Summary</div>
    <div style="padding:0 16px 8px">
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-val" id="stat-total">—</span>
          <span class="stat-lbl">Total POIs</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="stat-visible">—</span>
          <span class="stat-lbl">Visible</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="stat-cats">—</span>
          <span class="stat-lbl">Layers</span>
        </div>
      </div>
      <div class="data-src">Data: <a href="https://www.openstreetmap.org" target="_blank">© OpenStreetMap</a> contributors · Overpass API</div>
    </div>
  </div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <button class="toggle-btn" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="topbar-title">🏙️ <span>Dhaka</span> City Utilities</div>

  <div class="style-btns">
    <button class="style-btn active" onclick="setStyle('dark')">🌑 Dark</button>
    <button class="style-btn" onclick="setStyle('light')">☀️ Light</button>
    <button class="style-btn" onclick="setStyle('osm')">🗺️ Street</button>
  </div>

  <span class="status-lbl" style="margin-left:auto">
    <span class="status-dot" id="status-dot"></span>
  </span>
  <span class="status-lbl" id="status-lbl">Online</span>

  <button class="toggle-btn" onclick="toggleLegend()" title="Toggle legend">📋</button>
</div>

<!-- Mini Legend -->
<div id="mini-legend"></div>

<!-- Map -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  UTILITY CATEGORY CONFIG
// ─────────────────────────────────────────────
const CATS = [
  { id:'hospital',   label:'Hospitals',      icon:'🏥', color:'#ff4757', rgb:'255,71,87',   tags:{amenity:'hospital'},        size:8, pulse:true  },
  { id:'clinic',     label:'Clinics',        icon:'⚕️', color:'#ff6b81', rgb:'255,107,129', tags:{amenity:'clinic'},          size:6, pulse:false },
  { id:'school',     label:'Schools',        icon:'🏫', color:'#2ed573', rgb:'46,213,115',  tags:{amenity:'school'},          size:6, pulse:false },
  { id:'university', label:'Universities',   icon:'🎓', color:'#1e90ff', rgb:'30,144,255',  tags:{amenity:'university'},      size:8, pulse:false },
  { id:'park',       label:'Parks',          icon:'🌳', color:'#7bed9f', rgb:'123,237,159', tags:{leisure:'park'},            size:7, pulse:false },
  { id:'police',     label:'Police',         icon:'👮', color:'#3742fa', rgb:'55,66,250',   tags:{amenity:'police'},          size:7, pulse:true  },
  { id:'fire',       label:'Fire Stations',  icon:'🚒', color:'#ff6348', rgb:'255,99,72',   tags:{amenity:'fire_station'},    size:7, pulse:true  },
  { id:'bank',       label:'Banks & ATMs',   icon:'🏦', color:'#ffa502', rgb:'255,165,2',   tags:{amenity:'bank'},            size:6, pulse:false },
  { id:'mosque',     label:'Mosques',        icon:'🕌', color:'#a29bfe', rgb:'162,155,254', tags:{amenity:'place_of_worship'},size:5, pulse:false },
  { id:'fuel',       label:'Fuel Stations',  icon:'⛽', color:'#fd9644', rgb:'253,150,68',  tags:{amenity:'fuel'},            size:6, pulse:false },
  { id:'pharmacy',   label:'Pharmacies',     icon:'💊', color:'#fd79a8', rgb:'253,121,168', tags:{amenity:'pharmacy'},        size:5, pulse:false },
  { id:'busstop',    label:'Bus Stops',      icon:'🚌', color:'#00cec9', rgb:'0,206,201',   tags:{highway:'bus_stop'},        size:4, pulse:false },
  { id:'market',     label:'Markets',        icon:'🛒', color:'#fdcb6e', rgb:'253,203,110', tags:{amenity:'marketplace'},     size:7, pulse:false },
];

// Map of all amenity → category
const AMENITY_MAP = {};
CATS.forEach(c => {
  const k = Object.keys(c.tags)[0];
  const v = c.tags[k];
  AMENITY_MAP[v] = c.id;
});

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const active = {};
CATS.forEach(c => active[c.id] = true);

const layerGroups = {};
CATS.forEach(c => layerGroups[c.id] = L.layerGroup());

const catData = {};   // id → [{name, lat, lng, tags}, ...]
CATS.forEach(c => catData[c.id] = []);

// ─────────────────────────────────────────────
//  MAP INIT
// ─────────────────────────────────────────────
const DHAKA = [23.7806, 90.4193];

const map = L.map('map', {
  center: DHAKA, zoom: 13,
  zoomControl: false,
  attributionControl: false
});

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomleft', prefix: false })
  .addTo(map)
  .setPrefix('<a href="https://leafletjs.com">Leaflet</a> | © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>');

const TILES = {
  dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  osm:   'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
};

let currentTile = L.tileLayer(TILES.dark, { maxZoom:19 }).addTo(map);

function setStyle(s) {
  map.removeLayer(currentTile);
  currentTile = L.tileLayer(TILES[s], { maxZoom:19 }).addTo(map);
  currentTile.bringToBack();
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// Add all layer groups to map
CATS.forEach(c => layerGroups[c.id].addTo(map));

// ─────────────────────────────────────────────
//  SIDEBAR RENDER
// ─────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('cat-list');
  list.innerHTML = CATS.map(c => `
    <button class="cat-btn active" id="btn-${c.id}"
      style="--cat-color:${c.color};--cat-rgb:${c.rgb}"
      onclick="toggleCat('${c.id}')">
      <span class="cat-dot" id="dot-${c.id}"></span>
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-label">${c.label}</span>
      <span class="cat-count" id="cnt-${c.id}">—</span>
    </button>
  `).join('');
}

function renderLegend() {
  const leg = document.getElementById('mini-legend');
  leg.innerHTML = '<div style="font-size:.65rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Legend</div>'
    + CATS.map(c => `
      <div class="legend-row" onclick="toggleCat('${c.id}')">
        <div class="legend-dot" style="background:${c.color};box-shadow:0 0 5px ${c.color}"></div>
        <div class="legend-label">${c.icon} ${c.label}</div>
      </div>
    `).join('');
}

// ─────────────────────────────────────────────
//  MARKER CREATION
// ─────────────────────────────────────────────
function createMarker(cat, lat, lng, name, tags) {
  const m = L.circleMarker([lat, lng], {
    radius: cat.size,
    fillColor: cat.color,
    fillOpacity: 0.88,
    color: 'rgba(255,255,255,0.6)',
    weight: 1.5,
  });

  const addr = tags['addr:street'] ? `${tags['addr:street']}, Dhaka` : 'Dhaka, Bangladesh';
  const operator = tags.operator || tags.brand || '';

  m.bindPopup(`
    <div class="popup-inner">
      <div class="popup-type-badge" style="background:rgba(${cat.rgb},.18);color:${cat.color}">
        ${cat.icon} ${cat.label.replace(/s$/, '')}
      </div>
      <div class="popup-name">${name || 'Unnamed'}</div>
      <div class="popup-detail">
        ${operator ? `<span>🏢 ${operator}</span><br/>` : ''}
        📍 ${addr}
      </div>
    </div>
    <div class="popup-footer">Click to search nearby</div>
  `, { className: 'custom-popup', maxWidth: 260 });

  m.on('mouseover', () => m.setStyle({ fillOpacity: 1, radius: cat.size + 2 }));
  m.on('mouseout',  () => m.setStyle({ fillOpacity: 0.88, radius: cat.size }));

  return m;
}

// ─────────────────────────────────────────────
//  OVERPASS FETCH
// ─────────────────────────────────────────────
// Dhaka bounding box: S, W, N, E
const BBOX = '23.65,90.30,23.93,90.53';

const OVERPASS = 'https://overpass-api.de/api/interpreter';

// Single combined query for all cats
const OVERPASS_QUERY = `
[out:json][timeout:60];
(
  node["amenity"~"hospital|clinic|school|university|police|fire_station|bank|place_of_worship|fuel|pharmacy|marketplace"](${BBOX});
  way["amenity"~"hospital|clinic|school|university|police|fire_station|bank|place_of_worship|fuel|pharmacy|marketplace"](${BBOX});
  node["leisure"="park"](${BBOX});
  way["leisure"="park"](${BBOX});
  node["highway"="bus_stop"](${BBOX});
);
out center;
`.trim();

// Category resolver
function resolveCat(tags) {
  if (tags.amenity) {
    const mid = AMENITY_MAP[tags.amenity];
    if (mid) {
      if (mid === 'mosque' && tags.religion && tags.religion !== 'muslim') return null;
      return mid;
    }
  }
  if (tags.leisure === 'park') return 'park';
  if (tags.highway === 'bus_stop') return 'busstop';
  return null;
}

function getName(tags) {
  return tags.name || tags['name:en'] || tags['name:bn'] || null;
}

async function fetchData() {
  setProgress(10, 'Sending query to Overpass API…');

  try {
    const res = await fetch(OVERPASS, {
      method: 'POST',
      body: 'data=' + encodeURIComponent(OVERPASS_QUERY),
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    setProgress(60, 'Processing map data…');
    const json = await res.json();

    setProgress(80, 'Rendering markers…');
    processElements(json.elements);

    setProgress(100, 'Done!');
    setTimeout(hideLoading, 600);

  } catch (err) {
    console.warn('Overpass failed, loading fallback data:', err);
    setProgress(70, 'API unavailable — loading sample data…');
    loadFallback();
    setTimeout(hideLoading, 1000);
  }
}

function processElements(elements) {
  elements.forEach(el => {
    const tags = el.tags || {};
    const catId = resolveCat(tags);
    if (!catId) return;

    const lat = el.lat ?? el.center?.lat;
    const lng = el.lon ?? el.center?.lon;
    if (!lat || !lng) return;

    const name = getName(tags) || catId.charAt(0).toUpperCase() + catId.slice(1);
    const cat = CATS.find(c => c.id === catId);
    if (!cat) return;

    catData[catId].push({ name, lat, lng, tags });
    const marker = createMarker(cat, lat, lng, name, tags);
    layerGroups[catId].addLayer(marker);
  });

  updateStats();
  updateCounts();
}

function loadFallback() {
  FALLBACK.forEach(({catId, name, lat, lng}) => {
    const cat = CATS.find(c => c.id === catId);
    if (!cat) return;
    catData[catId].push({ name, lat, lng, tags: {} });
    const marker = createMarker(cat, lat, lng, name, {});
    layerGroups[catId].addLayer(marker);
  });
  updateStats();
  updateCounts();
  showToast('⚠️ Using sample data — Overpass API unavailable');
}

// ─────────────────────────────────────────────
//  FILTER / TOGGLE
// ─────────────────────────────────────────────
function toggleCat(id) {
  active[id] = !active[id];
  const btn = document.getElementById('btn-' + id);
  const lg  = layerGroups[id];
  if (active[id]) {
    lg.addTo(map);
    btn.classList.add('active');
  } else {
    map.removeLayer(lg);
    btn.classList.remove('active');
  }
  updateStats();
}

function toggleAll(on) {
  CATS.forEach(c => {
    active[c.id] = on;
    const btn = document.getElementById('btn-' + c.id);
    if (on) {
      layerGroups[c.id].addTo(map);
      btn.classList.add('active');
    } else {
      map.removeLayer(layerGroups[c.id]);
      btn.classList.remove('active');
    }
  });
  updateStats();
}

// ─────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    CATS.forEach(c => {
      layerGroups[c.id].eachLayer(m => m.setStyle({ radius: c.size, fillOpacity: 0.88 }));
    });
    return;
  }
  CATS.forEach(c => {
    layerGroups[c.id].eachLayer(m => {
      const popup = m.getPopup()?.getContent() || '';
      const match = popup.toLowerCase().includes(q);
      m.setStyle({ fillOpacity: match ? 1 : 0.12, radius: match ? c.size + 3 : c.size });
    });
  });
});

// ─────────────────────────────────────────────
//  STATS + COUNTS
// ─────────────────────────────────────────────
function updateStats() {
  let total = 0, visible = 0, cats = 0;
  CATS.forEach(c => {
    const n = catData[c.id].length;
    total += n;
    if (active[c.id]) { visible += n; cats++; }
  });
  animateNum('stat-total',   total);
  animateNum('stat-visible', visible);
  animateNum('stat-cats',    cats);
}

function updateCounts() {
  CATS.forEach(c => {
    const el = document.getElementById('cnt-' + c.id);
    if (el) el.textContent = catData[c.id].length || '0';
  });
}

function animateNum(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = parseInt(el.textContent) || 0;
  const dur = 600, step = 16;
  let t = 0;
  const timer = setInterval(() => {
    t += step;
    el.textContent = Math.round(start + (target - start) * Math.min(t / dur, 1));
    if (t >= dur) clearInterval(timer);
  }, step);
}
