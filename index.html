<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Dhaka City — Utilities & Live Users</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04040e;--sb:#07071a;--c1:#0d0d22;--c2:#121230;
  --bd:#181838;--bd2:#20204a;
  --tx:#dde1ff;--tx2:#7880b8;--tx3:#363870;
  --ac:#38bdf8;--gr:#22c55e;--yw:#f59e0b;--re:#ef4444;
}
html,body{height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:1}
.leaflet-container{background:#04040e}
.leaflet-control-zoom{border:none!important;box-shadow:none!important}
.leaflet-control-zoom a{
  background:var(--c1)!important;color:var(--tx)!important;
  border:1px solid var(--bd2)!important;margin-bottom:3px!important;
  border-radius:8px!important;width:30px!important;height:30px!important;
  line-height:30px!important;font-size:1rem!important;transition:background .2s!important
}
.leaflet-control-zoom a:hover{background:var(--c2)!important}
.leaflet-control-attribution{
  background:rgba(4,4,14,.7)!important;color:var(--tx3)!important;font-size:.6rem!important;
  padding:2px 6px!important;border-radius:4px 0 0 0!important;
}
.leaflet-control-attribution a{color:var(--tx2)!important}

/* ── SIDEBAR ── */
#sb{
  position:fixed;left:0;top:0;bottom:0;width:295px;
  background:var(--sb);border-right:1px solid var(--bd);
  z-index:500;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:6px 0 32px rgba(0,0,0,.6);
}
#sb.closed{transform:translateX(-295px)}

/* header */
.sbh{
  padding:15px 15px 12px;flex-shrink:0;
  border-bottom:1px solid var(--bd);
  background:linear-gradient(180deg,rgba(56,189,248,.07) 0%,transparent 100%);
}
.sbh-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sbh-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;
  box-shadow:0 0 14px rgba(56,189,248,.45);
}
.sbh-t{font-size:.95rem;font-weight:800;letter-spacing:-.01em;line-height:1.1}
.sbh-s{font-size:.62rem;color:var(--tx2);font-weight:500}
.sbh-search{position:relative}
.sbh-input{
  width:100%;background:var(--c1);border:1px solid var(--bd2);color:var(--tx);
  padding:8px 12px 8px 34px;border-radius:8px;font-size:.8rem;
  outline:none;transition:border-color .2s;font-family:inherit;
}
.sbh-input:focus{border-color:var(--ac)}
.sbh-input::placeholder{color:var(--tx3)}
.sbh-si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:.85rem;pointer-events:none}

/* body scroll */
.sbb{flex:1;overflow-y:auto;overflow-x:hidden}
.sbb::-webkit-scrollbar{width:3px}
.sbb::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* voronoi control strip */
.vctrl{
  margin:10px 14px 4px;
  background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(129,140,248,.08));
  border:1px solid rgba(56,189,248,.2);
  border-radius:10px;padding:10px 12px;
}
.vctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.vctrl-title{font-size:.72rem;font-weight:800;color:var(--ac);flex:1;letter-spacing:.03em}
.vtoggle{
  position:relative;width:36px;height:20px;cursor:pointer;
  background:var(--bd2);border-radius:999px;transition:background .2s;border:none;
  flex-shrink:0;
}
.vtoggle.on{background:var(--ac)}
.vtoggle::after{
  content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;
  border-radius:50%;background:#fff;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.vtoggle.on::after{transform:translateX(16px)}
.vctrl-label{font-size:.68rem;color:var(--tx2)}
.vslider{
  width:100%;accent-color:var(--ac);cursor:pointer;height:4px;
  background:var(--bd2);border-radius:2px;outline:none;-webkit-appearance:none;
}
.vslider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--ac);cursor:pointer;box-shadow:0 0 6px rgba(56,189,248,.5);
}

/* section headers */
.sch{
  display:flex;align-items:center;gap:8px;padding:10px 15px 5px;
  cursor:pointer;user-select:none;
}
.sch-t{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);flex:1}
.sch-n{
  font-size:.65rem;font-weight:700;background:var(--bd2);
  color:var(--tx2);padding:2px 7px;border-radius:999px;
}
.sch-arr{color:var(--tx3);font-size:.65rem;transition:transform .25s}
.sch.open .sch-arr{transform:rotate(90deg)}
.scb{overflow:hidden;transition:max-height .3s ease}

/* user items */
.u-bar{display:flex;gap:6px;padding:5px 14px 8px}
.u-bar-btn{
  flex:1;padding:6px;border-radius:8px;font-size:.68rem;font-weight:700;
  cursor:pointer;border:1px solid var(--bd2);background:var(--c1);
  color:var(--tx2);transition:all .2s;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.u-bar-btn:hover{background:var(--c2);color:var(--tx)}
.u-bar-btn.live{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:var(--gr)}

.uitem{
  display:flex;align-items:center;gap:9px;padding:7px 14px;
  cursor:pointer;transition:background .15s;
}
.uitem:hover{background:rgba(255,255,255,.025)}
.uitem.hidden{opacity:.35}
.udot-w{position:relative;flex-shrink:0;width:16px;height:16px}
.udot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.25)}
.upip{
  position:absolute;bottom:-2px;right:-2px;
  width:7px;height:7px;border-radius:50%;border:2px solid var(--sb);
}
.upip.online{background:var(--gr)} .upip.away{background:var(--yw)} .upip.offline{background:var(--tx3)}
.uinfo{flex:1;min-width:0}
.uname{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.umeta{font-size:.62rem;color:var(--tx3);margin-top:1px}
.uaction{
  width:22px;height:22px;border-radius:6px;background:var(--bd2);border:none;
  color:var(--tx2);cursor:pointer;font-size:.68rem;display:flex;align-items:center;
  justify-content:center;transition:all .2s;flex-shrink:0;margin-left:2px;
}
.uaction:hover{background:var(--ac);color:#000}

/* utility categories */
.cat-ctrl{display:flex;gap:5px;padding:4px 14px 6px}
.cat-ctrl-b{
  flex:1;padding:5px;border-radius:7px;font-size:.65rem;font-weight:700;
  cursor:pointer;border:1px solid var(--bd2);background:var(--c1);
  color:var(--tx2);transition:all .2s;font-family:inherit;
}
.cat-ctrl-b:hover{background:var(--c2);color:var(--tx)}
.catrow{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  cursor:pointer;background:none;border:none;color:var(--tx);
  font-family:inherit;width:100%;text-align:left;
  transition:background .12s;border-left:3px solid transparent;
}
.catrow:hover{background:rgba(255,255,255,.025)}
.catrow.on{border-left-color:var(--cc);background:rgba(255,255,255,.018)}
.catrow:not(.on){opacity:.45}
.cglyph{width:8px;height:8px;border-radius:50%;background:var(--cc);flex-shrink:0;box-shadow:0 0 6px var(--cc)}
.cemoji{font-size:.82rem;flex-shrink:0}
.cname{font-size:.78rem;font-weight:500;flex:1}
.ccnt{
  font-size:.65rem;font-weight:700;background:rgba(255,255,255,.06);
  color:var(--tx2);padding:1px 6px;border-radius:999px;min-width:26px;text-align:center;
}
.catrow.on .ccnt{background:rgba(var(--ccr),.2);color:var(--cc)}

/* stats footer */
.sbf{
  border-top:1px solid var(--bd);padding:11px 14px;flex-shrink:0;
  background:var(--c1);
}
.sfg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.sbox{background:var(--c2);border:1px solid var(--bd2);border-radius:8px;padding:7px;text-align:center}
.sv{font-size:1.1rem;font-weight:800;color:var(--tx);display:block}
.sl{font-size:.55rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}
.snote{font-size:.58rem;color:var(--tx3);text-align:center}

/* ── TOP BAR ── */
#tb{
  position:fixed;top:0;left:295px;right:0;height:48px;
  background:rgba(4,4,14,.88);border-bottom:1px solid var(--bd);
  backdrop-filter:blur(18px);z-index:400;
  display:flex;align-items:center;gap:7px;padding:0 11px;
  transition:left .35s cubic-bezier(.4,0,.2,1);
}
#tb.full{left:0}
.tbb{
  width:32px;height:32px;border-radius:8px;background:var(--c1);
  border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;flex-shrink:0;color:var(--tx);transition:background .2s;
}
.tbb:hover{background:var(--c2)}
.tbt{font-weight:800;font-size:.88rem;white-space:nowrap;letter-spacing:-.01em}
.tbt span{color:var(--ac)}
.tbsep{width:1px;height:20px;background:var(--bd2);flex-shrink:0}
.srow{display:flex;gap:3px}
.sb2{
  padding:4px 9px;border-radius:7px;font-size:.68rem;font-weight:700;
  cursor:pointer;border:1px solid var(--bd2);background:var(--c1);
  color:var(--tx2);transition:all .2s;font-family:inherit;white-space:nowrap;
}
.sb2.on{background:rgba(56,189,248,.15);border-color:var(--ac);color:var(--ac)}
.opill{
  display:flex;align-items:center;gap:5px;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);
  border-radius:999px;padding:3px 9px;font-size:.68rem;font-weight:700;color:var(--gr);
  white-space:nowrap;
}
.opip{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:opip 1.5s infinite}
@keyframes opip{0%,100%{opacity:1}50%{opacity:.25}}

/* ── USER MARKERS (div-icon CSS) ── */
.um{position:relative;width:26px;height:26px;cursor:pointer}
.um-r1,.um-r2{
  position:absolute;inset:-5px;border-radius:50%;
  border:2px solid currentColor;opacity:0;
  animation:umP 2.4s ease-out infinite;
}
.um-r2{animation-delay:1.2s}
@keyframes umP{0%{transform:scale(1);opacity:.85}100%{transform:scale(2.6);opacity:0}}
.um.away .um-r1,.um.away .um-r2{animation-duration:5s}
.um.offline .um-r1,.um.offline .um-r2{display:none}
.um-core{
  position:absolute;inset:0;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px currentColor,0 2px 10px rgba(0,0,0,.7);
}
.um-lbl{font-size:6px;font-weight:900;color:#fff;letter-spacing:-.2px;line-height:1}
.um-pip{
  position:absolute;bottom:-3px;right:-3px;
  width:9px;height:9px;border-radius:50%;
  border:2px solid var(--sb);
}
.um.online .um-pip{background:var(--gr)}
.um.away   .um-pip{background:var(--yw)}
.um.offline .um-pip{background:var(--tx3)}
.um.offline .um-core{opacity:.45}

/* ── POPUP ── */
.custom-popup .leaflet-popup-content-wrapper{
  background:var(--c1);border:1px solid var(--bd2);border-radius:14px;
  box-shadow:0 16px 48px rgba(0,0,0,.8);padding:0;overflow:hidden;min-width:215px;
}
.custom-popup .leaflet-popup-tip-container{display:none}
.custom-popup .leaflet-popup-content{margin:0;padding:0}
.ph{padding:12px 14px 9px;border-bottom:1px solid var(--bd)}
.pbadge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;
  font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;
}
.pname{font-size:.9rem;font-weight:800;color:var(--tx);margin-bottom:4px}
.psub{font-size:.7rem;color:var(--tx2);line-height:1.55}
.pfoot{padding:7px 14px;font-size:.62rem;color:var(--tx3);background:rgba(0,0,0,.3)}

/* Voronoi cell highlight on hover */
.leaflet-interactive:focus{outline:none}

/* ── LEGEND PANEL ── */
#lgp{
  position:fixed;right:11px;top:58px;
  background:rgba(7,7,26,.92);border:1px solid var(--bd2);
  border-radius:12px;padding:11px 13px;z-index:400;
  backdrop-filter:blur(14px);font-size:.68rem;
  max-height:calc(100dvh - 78px);overflow-y:auto;
  display:none;min-width:155px;
  box-shadow:0 10px 40px rgba(0,0,0,.7);
}
#lgp::-webkit-scrollbar{width:2px}
#lgp::-webkit-scrollbar-thumb{background:var(--bd2)}
#lgp.show{display:block;animation:lgIn .2s ease}
@keyframes lgIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.lgt{font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin:7px 0 3px}
.lgt:first-child{margin-top:0}
.lgr{display:flex;align-items:center;gap:7px;padding:2.5px 0;cursor:pointer}
.lgd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lgl{color:var(--tx2);white-space:nowrap;font-weight:500}

/* ── TOAST ── */
#toast{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);
  background:var(--c2);border:1px solid var(--bd2);border-radius:9px;
  padding:8px 15px;font-size:.77rem;color:var(--tx);z-index:9000;
  opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;
  box-shadow:0 6px 24px rgba(0,0,0,.6);
}
#toast.show{opacity:1}

/* ── LOADING ── */
#ld{
  position:fixed;inset:0;z-index:2000;background:rgba(4,4,14,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
  transition:opacity .5s;
}
#ld.out{opacity:0;pointer-events:none}
.ld-ic{font-size:2.8rem;animation:ldspin 2.5s linear infinite}
@keyframes ldspin{to{transform:rotate(360deg)}}
.ld-tt{font-size:1.05rem;font-weight:800}
.ld-sb{font-size:.76rem;color:var(--tx2)}
.ld-bar{width:200px;height:3px;background:var(--bd2);border-radius:999px;overflow:hidden}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#818cf8,#22c55e);border-radius:999px;transition:width .4s ease}
.ld-msg{font-size:.68rem;color:var(--tx3)}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  #sb{width:270px}#sb.closed{transform:translateX(-270px)}
  #tb{left:0!important} .srow{display:none}
  #lgp{right:8px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="ld">
  <div class="ld-ic">🏙️</div>
  <div class="ld-tt">Dhaka City Map</div>
  <div class="ld-sb">Fetching live utilities & user data…</div>
  <div class="ld-bar"><div class="ld-fill" id="ldf"></div></div>
  <div class="ld-msg" id="ldmsg">Initializing map…</div>
</div>
<div id="toast"></div>
<div id="map"></div>
<div id="lgp"></div>

<!-- SIDEBAR -->
<div id="sb">
  <div class="sbh">
    <div class="sbh-logo">
      <div class="sbh-icon">🏙️</div>
      <div>
        <div class="sbh-t">Dhaka City Map</div>
        <div class="sbh-s">Utilities · Users · Voronoi Zones</div>
      </div>
    </div>
    <div class="sbh-search">
      <span class="sbh-si">🔍</span>
      <input class="sbh-input" id="search" type="text" placeholder="Search utilities…"/>
    </div>
  </div>

  <div class="sbb" id="sbb"></div>

  <div class="sbf">
    <div class="sfg">
      <div class="sbox"><span class="sv" id="st-p">—</span><span class="sl">POIs</span></div>
      <div class="sbox"><span class="sv" id="st-u">12</span><span class="sl">Users</span></div>
      <div class="sbox"><span class="sv" id="st-l">—</span><span class="sl">Layers</span></div>
      <div class="sbox"><span class="sv" id="st-on">—</span><span class="sl">Online</span></div>
    </div>
    <div class="snote">© OpenStreetMap contributors · Overpass API</div>
  </div>
</div>

<!-- TOP BAR -->
<div id="tb">
  <button class="tbb" onclick="toggleSB()">☰</button>
  <div class="tbt">🏙️ <span>Dhaka</span> — Utilities & Users</div>
  <div class="tbsep"></div>
  <div class="srow">
    <button class="sb2 on" onclick="setTile('dark',this)">🌑 Dark</button>
    <button class="sb2" onclick="setTile('light',this)">☀️ Light</button>
    <button class="sb2" onclick="setTile('osm',this)">🗺️ Street</button>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <div class="opill"><div class="opip"></div><span id="op-txt">— Online</span></div>
    <button class="tbb" onclick="toggleLegend()" title="Legend">📋</button>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6/dist/d3-delaunay.umd.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
//  CONFIG — 12 LIVE USERS  (vibrant, distinct, colorblind-safe)
// ═══════════════════════════════════════════════════════════════
const USERS = [
  {id:'USR-001', name:'Rafiqul Islam',  role:'Field Agent',  color:'#FF6B6B', lat:23.7806, lng:90.4193, status:'online' },
  {id:'USR-002', name:'Nasrin Begum',   role:'Inspector',    color:'#00E5FF', lat:23.7466, lng:90.3765, status:'online' },

  {id:'USR-005', name:'Rahim Uddin',   role:'Field Agent',  color:'#FF6D00', lat:23.8136, lng:90.4253, status:'online' },

// ═══════════════════════════════════════════════════════════════
//  VORONOI  —  computed in pixel space, stored as lat/lng polygons
// ═══════════════════════════════════════════════════════════════
function recomputeVoronoi() {
  voronoiLayer.clearLayers();
  if (!voronoiOn) return;

  const visible = USERS.filter(u => userVis[u.id] && u.status !== 'offline');
  if (visible.length < 2) return;

  // Work in container pixels; pad beyond viewport so cells don't look clipped
  const {x: W, y: H} = map.getSize();
  const PAD = 120;

  const pts = visible.map(u => {
    const p = map.latLngToContainerPoint([u.lat, u.lng]);
    return [p.x, p.y];
  });

  // Use d3-delaunay if available, else skip
  if (!window.d3Delaunay) return;

  const delaunay = d3Delaunay.Delaunay.from(pts);
  const voronoi  = delaunay.voronoi([-PAD, -PAD, W + PAD, H + PAD]);

  visible.forEach((u, i) => {
    const cell = voronoi.cellPolygon(i);
    if (!cell || cell.length < 3) return;

    // Convert pixel vertices → geographic coordinates
    const latLngs = cell.map(([x, y]) => map.containerPointToLatLng(L.point(x, y)));

    const poly = L.polygon(latLngs, {
      fillColor:   u.color,
      fillOpacity: voronoiAlpha,
      color:       u.color,
      weight:      1.5,
      opacity:     0.45,
      dashArray:   null,
      className:   'v-cell',
    });

    // Hover brighten
    poly.on('mouseover', () => {
      poly.setStyle({fillOpacity: Math.min(voronoiAlpha * 2.8, 0.55), weight: 2.5, opacity: 0.8});
      poly.bringToFront();
    });
    poly.on('mouseout', () => {
      poly.setStyle({fillOpacity: voronoiAlpha, weight: 1.5, opacity: 0.45});
    });

    // Click → open user popup
    poly.on('click', () => {
      const mk = userMks[u.id];
      if (mk) { map.flyTo([u.lat, u.lng], Math.max(map.getZoom(), 15), {duration:1}); mk.openPopup(); }
    });

    poly.bindTooltip(`<b style="color:${u.color}">${u.id}</b><br/>${u.name}<br/><small>${u.role}</small>`, {
      sticky:true, className:'vtt', opacity:0.92
    });

    voronoiLayer.addLayer(poly);
  });

  voronoiLayer.bringToBack();
}

// Debounce so pan/zoom doesn't hammer it
function scheduleVoronoi() {
  clearTimeout(voronoiDT);
  voronoiDT = setTimeout(recomputeVoronoi, 160);
}
map.on('moveend zoomend', scheduleVoronoi);

function placeAllUserMarkers() {
  userMarkLay.clearLayers();
  userTrailLay.clearLayers();
  Object.keys(userPaths).forEach(id => delete userPaths[id]);

  USERS.forEach(u => {
    if (!userVis[u.id]) return;
    const mk = L.marker([u.lat, u.lng], {
      icon: makeUserIcon(u),
      zIndexOffset: 1200,
    });
    mk.bindPopup(makeUserPopup(u), {className:'custom-popup', maxWidth:265});
    userMks[u.id] = mk;
    userMarkLay.addLayer(mk);

    // Trail
    drawTrail(u);
  });
}

function drawTrail(u) {
  if (userPaths[u.id]) userTrailLay.removeLayer(userPaths[u.id]);
  const hist = userHist[u.id];
  if (hist.length < 2 || u.status === 'offline') return;
  const trail = L.polyline(hist.slice(-10), {
    color: u.color, weight: 1.8, opacity: 0.35, dashArray: '3 6'
  });
  userTrailLay.addLayer(trail);
  userPaths[u.id] = trail;
}

function refreshUserMarker(u) {
  const mk = userMks[u.id];
  if (!mk) return;
  mk.setLatLng([u.lat, u.lng]);
  mk.setIcon(makeUserIcon(u));
  mk.setPopupContent(makeUserPopup(u));
  drawTrail(u);
}

function startSim() {
  if (simTimer) return;
  simTimer = setInterval(() => {
    USERS.forEach(u => {
      if (u.status === 'offline') return;
      const spd = u.status === 'online' ? 0.0028 : 0.0012;
      u.lat = Math.max(23.66, Math.min(23.93, u.lat + (Math.random()-.5)*spd));
      u.lng = Math.max(90.29, Math.min(90.54, u.lng + (Math.random()-.5)*spd));
      userHist[u.id].push([u.lat, u.lng]);
      if (userHist[u.id].length > 22) userHist[u.id].shift();
      refreshUserMarker(u);
    });
    scheduleVoronoi();
    updateUserRows();
  }, 1800);
  document.getElementById('simb').textContent = '⏸ Pause';
  document.getElementById('simb').classList.add('live');
  showToast('🔴 Simulation live — users moving every 1.8s');
}

function stopSim() {
  clearInterval(simTimer); simTimer = null;
  document.getElementById('simb').textContent = '▶ Simulate';
  document.getElementById('simb').classList.remove('live');
  showToast('⏸ Paused');
}

function toggleSim() { simTimer ? stopSim() : startSim(); }

function resetPositions() {
  stopSim();
  USERS.forEach(u => {
    u.lat = origPos[u.id].lat; u.lng = origPos[u.id].lng;
    userHist[u.id] = [[u.lat, u.lng]];
    refreshUserMarker(u);
  });
  recomputeVoronoi();
  updateUserRows();
  showToast('↺ Positions reset');
}

function flyToUser(id) {
  const u = USERS.find(x => x.id === id);
  if (!u) return;
  map.flyTo([u.lat, u.lng], Math.max(map.getZoom(), 16), {duration:1.2});
  setTimeout(() => userMks[id]?.openPopup(), 1300);
}

function toggleUser(id) {
  userVis[id] = !userVis[id];
  placeAllUserMarkers();
  recomputeVoronoi();
  updateUserRows();
  updateStats();
}

function catFromTags(tags) {
  if (tags.amenity) {
    for (const c of CATS) {
      if (c.tag.amenity === tags.amenity) {
        if (c.id === 'mosque' && tags.religion && tags.religion !== 'muslim') return null;
        return c;
      }
    }
  }
  if (tags.leisure === 'park')    return CATS.find(x => x.id === 'park');
  if (tags.highway === 'bus_stop') return CATS.find(x => x.id === 'busstop');
  return null;
}

function makeUtilMarker(c, lat, lng, name, tags) {
  const addr = tags['addr:street'] ? tags['addr:street']+', Dhaka' : 'Dhaka, Bangladesh';
  const op   = tags.operator || tags.brand || '';
  const m = L.circleMarker([lat, lng], {
    radius: c.r, fillColor: c.color, fillOpacity: .85,
    color: 'rgba(255,255,255,.45)', weight: 1.5,
  });
  m.bindPopup(`
    <div class="ph">
      <div class="pbadge" style="background:rgba(${c.rgb},.18);color:${c.color}">${c.icon} ${c.label.replace(/s$/,'')}</div>
      <div class="pname">${name || 'Unnamed'}</div>
      <div class="psub">${op ? `🏢 ${op}<br/>` : ''}📍 ${addr}</div>
    </div>
    <div class="pfoot">OpenStreetMap data</div>
  `, {className:'custom-popup', maxWidth:265});
  m.on('mouseover', () => m.setStyle({fillOpacity:1, radius:c.r+2}));
  m.on('mouseout',  () => m.setStyle({fillOpacity:.85, radius:c.r}));
  return m;
}

function processElements(els) {
  els.forEach(el => {
    const tags = el.tags || {};
    const c    = catFromTags(tags);
    if (!c) return;
    const lat = el.lat ?? el.center?.lat;
    const lng = el.lon ?? el.center?.lon;
    if (!lat || !lng) return;
    const name = tags.name || tags['name:en'] || tags['name:bn'] || c.label.replace(/s$/,'');
    catData[c.id].push({name, lat, lng});
    catLayers[c.id].addLayer(makeUtilMarker(c, lat, lng, name, tags));
  });
  updateCounts();
  updateStats();
}

function updateCounts() {
  CATS.forEach(c => {
    const el = document.getElementById('cn-'+c.id);
    if (el) el.textContent = catData[c.id].length || 0;
  });
}
function updateStats() {
  let pois=0, layers=0;
  CATS.forEach(c => { pois += catData[c.id].length; if (catActive[c.id]) layers++; });
  const onl = USERS.filter(u => u.status==='online' && userVis[u.id]).length;
  animN('st-p',  pois);
  animN('st-l',  layers);
  animN('st-u',  USERS.filter(u => userVis[u.id]).length);
  animN('st-on', onl);
  document.getElementById('op-txt').textContent = `${onl} Online`;
  const sn = document.getElementById('sn-users');
  if (sn) sn.textContent = `${USERS.filter(u=>u.status==='online').length} online`;
}
function animN(id, to) {
  const el = document.getElementById(id); if (!el) return;
  const from = parseInt(el.textContent) || 0;
  let t = 0;
  const ti = setInterval(() => {
    t += 20; el.textContent = Math.round(from + (to-from) * Math.min(t/600, 1));
    if (t >= 600) clearInterval(ti);
  }, 20);
}

(node["amenity"~"hospital|clinic|school|university|police|fire_station|bank|place_of_worship|fuel|pharmacy|marketplace"](${BBOX});
 way["amenity"~"hospital|clinic|school|university|police|fire_station|bank|place_of_worship|fuel|pharmacy|marketplace"](${BBOX});
 node["leisure"="park"](${BBOX}); way["leisure"="park"](${BBOX});
 node["highway"="bus_stop"](${BBOX});
);out center;`;

async function fetchData() {
  setProgress(15, 'Querying Overpass API for Dhaka…');
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method:'POST', body:'data='+encodeURIComponent(OPQ),
      headers:{'Content-Type':'application/x-www-form-urlencoded'}
    });
    if (!res.ok) throw new Error();
    setProgress(65, 'Processing OSM data…');
    const j = await res.json();
    setProgress(88, 'Rendering markers…');
    processElements(j.elements);
    setProgress(100, 'Done!');
    setTimeout(hideLoading, 500);
    const total = Object.values(catData).reduce((a,b) => a+b.length, 0);
    showToast(`✅ Loaded ${total} POIs from OpenStreetMap`);
  } catch(e) {
    setProgress(72, 'API unavailable — using built-in data…');
    loadFallback();
    setTimeout(hideLoading, 800);
    showToast('⚠️ Offline fallback data loaded');
  }
}

function loadFallback() {
  FB.forEach(({id, name, lat, lng}) => {

    catData[id].push({name,lat,lng});
    catLayers[id].addLayer(makeUtilMarker(c, lat, lng, name, {}));
  });
  updateCounts(); updateStats();
}
